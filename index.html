<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3조2교대 근무표</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Malgun Gothic','맑은 고딕',sans-serif;background:#f0f4f8;min-height:100vh;padding:12px;}
.container{max-width:980px;margin:0 auto;background:#fff;border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,.1);overflow:hidden;}

.header{padding:16px 20px 8px;display:flex;flex-direction:column;align-items:center;gap:8px;}
.header-row{display:flex;align-items:center;justify-content:center;gap:10px;}
.nav-btn{width:36px;height:36px;border-radius:50%;background:#1565c0;color:#fff;border:none;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.nav-btn:hover{background:#0d47a1;}
.year-select-wrap{position:relative;display:inline-flex;align-items:center;}
.year-select{font-size:18px;font-weight:700;border:2px solid #ddd;border-radius:8px;padding:3px 26px 3px 8px;background:#fff;cursor:pointer;appearance:none;-webkit-appearance:none;}
.year-arrow{position:absolute;right:5px;pointer-events:none;font-size:12px;color:#555;}
.month-title{font-size:26px;font-weight:900;color:#1a237e;}

.banner{display:none;text-align:center;font-size:13px;font-weight:700;padding:7px 12px;margin:0 8px 6px;border-radius:8px;cursor:pointer;}
.banner.active{display:block;}
.swap-banner{background:#1565c0;color:#fff;}

.cal-wrap{padding:0 6px 16px;}
table{width:100%;border-collapse:collapse;}
.day-header th{padding:7px 0;font-size:13px;font-weight:700;color:#555;text-align:center;border-bottom:2px solid #e0e0e0;}
.day-header th:nth-child(6){color:#1565c0;}
.day-header th:nth-child(7){color:#e53935;}
td{border:1px solid #e8eaf0;vertical-align:top;padding:5px 4px 6px;width:calc(100%/7);position:relative;}
.date-num{font-size:13px;font-weight:700;color:#222;margin-bottom:3px;display:flex;align-items:center;gap:3px;flex-wrap:wrap;}
.date-num.sun{color:#e53935;}.date-num.sat{color:#1565c0;}.date-num.hol{color:#e53935;}
.holi-label{font-size:8px;color:#e53935;font-weight:700;background:#fff3e0;border-radius:3px;padding:1px 3px;border:1px solid #ffcc80;white-space:nowrap;}
.shift-row{display:flex;align-items:center;gap:3px;margin-bottom:2px;flex-wrap:wrap;}

.badge-sm{display:inline-flex;align-items:center;justify-content:center;border-radius:4px;font-weight:700;font-size:10px;padding:1px 4px;color:#fff;min-width:24px;cursor:pointer;}
.badge-sm:hover{filter:brightness(1.15);}
.b1{background:#1565c0;}.b2{background:#2e7d32;}.b3{background:#e65100;}

@keyframes blink{0%,100%{opacity:1;}50%{opacity:.25;}}
.blink-avail{animation:blink .8s infinite;box-shadow:0 0 6px 2px rgba(67,160,71,.7);}

.vac-label{font-size:8px;font-weight:700;color:#6a1b9a;background:#f3e5f5;border:1px solid #ce93d8;border-radius:3px;padding:0 3px;display:inline-block;}
.swap-label{font-size:8px;color:#444;display:block;margin-top:1px;line-height:1.4;}
.s-ok{color:#2e7d32;font-weight:700;}.s-ov{color:#e53935;font-weight:700;}

.wk-row td{background:#e3f2fd;font-size:10px;font-weight:700;color:#1565c0;text-align:center;padding:2px;border:1px solid #e8eaf0;}
.wk-ov{color:#e53935;}
.dim-cell{background:#f5f5f5;}

td.swap-ok-cell{background:#e8f5e9!important;outline:2px solid #43a047;outline-offset:-2px;cursor:pointer;}
td.swap-ok-cell .date-num{color:#1b5e20!important;}
td.swap-dim{opacity:.3;pointer-events:none;}

/* 저장 버튼 */
.save-bar{padding:12px 16px;border-top:1px solid #e0e0e0;display:flex;align-items:center;gap:10px;justify-content:center;}
.save-btn{background:#1565c0;color:#fff;border:none;border-radius:10px;padding:12px 36px;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:7px;}
.save-btn:hover{background:#0d47a1;}
.save-msg{font-size:12px;color:#2e7d32;font-weight:700;display:none;}
.save-msg.show{display:inline;}

.wk-summary{margin:0 8px 4px;border-radius:10px;overflow:hidden;border:1.5px solid #e0e0e0;}
.wk-summary table{width:100%;}
.wkh{background:#1565c0;color:#fff;}
.wkh th{padding:7px 4px;font-size:11px;font-weight:700;text-align:center;}
.wkr td{padding:6px 6px;font-size:11px;text-align:center;border-bottom:1px solid #eee;}
.wkr:last-child td{border-bottom:none;}
.wkr:nth-child(even) td{background:#f5f7fa;}
.wkname{font-weight:600;text-align:left!important;padding-left:10px!important;}
.wkjo{display:inline-flex;align-items:center;justify-content:center;border-radius:4px;font-weight:700;font-size:11px;padding:1px 6px;color:#fff;}
.ok{color:#2e7d32;font-weight:700;}.ov{color:#e53935;font-weight:700;}

.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:999;align-items:center;justify-content:center;}
.overlay.on{display:flex;}
.pbox{background:#fff;border-radius:14px;padding:18px 18px 14px;min-width:270px;max-width:340px;width:92%;box-shadow:0 8px 32px rgba(0,0,0,.22);position:relative;max-height:88vh;overflow-y:auto;}
.ptitle{font-size:14px;font-weight:800;color:#1a237e;margin-bottom:10px;text-align:center;}
.pstep{font-size:11px;color:#666;margin-bottom:8px;font-weight:600;line-height:1.5;}
.pmembers{display:flex;flex-direction:column;gap:7px;margin-bottom:10px;}
.pmbtn{display:flex;align-items:center;gap:8px;padding:9px 11px;border-radius:8px;border:2px solid #e0e0e0;background:#f9f9f9;cursor:pointer;font-size:13px;font-weight:700;transition:border-color .15s,background .15s;width:100%;}
.pmbtn:hover{border-color:#1565c0;background:#e3f2fd;}
.pmbtn.sel{border-color:#1565c0;background:#e3f2fd;}
.pmbtn.vbtn:hover,.pmbtn.vbtn.sel{border-color:#6a1b9a;background:#f3e5f5;}
.pmbtn.dbtn{border-color:#e53935;color:#e53935;}
.pmbtn.dbtn:hover{background:#fff3f3;}
.pdot{width:13px;height:13px;border-radius:3px;flex-shrink:0;}
.pd1{background:#1565c0;}.pd2{background:#2e7d32;}.pd3{background:#e65100;}
.presult{background:#f5f5f5;border-radius:8px;padding:9px 11px;margin-bottom:10px;font-size:12px;line-height:1.9;}
.chkok{color:#2e7d32;font-weight:700;}.chkov{color:#e53935;font-weight:700;}
.pbtns{display:flex;gap:7px;}
.pbtn{flex:1;padding:9px;border-radius:8px;border:none;font-size:13px;font-weight:700;cursor:pointer;}
.pbtn-cancel{background:#eee;color:#555;}
.pbtn-ok{background:#1565c0;color:#fff;}
.pbtn-ok:disabled{background:#bbb;cursor:default;}
.pclose{position:absolute;top:9px;right:12px;font-size:19px;color:#aaa;cursor:pointer;}

@media(max-width:600px){
  body{padding:4px;}
  .month-title{font-size:20px;}
  td{padding:3px 2px 3px;}
  .date-num{font-size:11px;}
  .badge-sm{font-size:9px;padding:1px 2px;min-width:20px;}
}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="header-row">
      <button class="nav-btn" id="prevYear">&#8249;</button>
      <div class="year-select-wrap">
        <select class="year-select" id="yearSel"></select>
        <span class="year-arrow">▾</span>
      </div>
      <button class="nav-btn" id="nextYear">&#8250;</button>
    </div>
    <div class="header-row">
      <button class="nav-btn" id="prevMonth">&#8249;</button>
      <div class="month-title" id="mTitle"></div>
      <button class="nav-btn" id="nextMonth">&#8250;</button>
    </div>
  </div>

  <div class="banner swap-banner" id="swapBanner" onclick="cancelSwap()">
    🔄 교대 가능 날짜(초록·점멸) 클릭하세요 &nbsp;✕ 취소
  </div>

  <div class="cal-wrap" id="calWrap"></div>
  <div class="wk-summary" id="wkSummary"></div>

  <div class="save-bar">
    <button class="save-btn" onclick="doSave()">💾 저장</button>
    <span class="save-msg" id="saveMsg">✅ 저장되었습니다</span>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="pbox">
    <span class="pclose" id="pClose">✕</span>
    <div class="ptitle"  id="pTitle"></div>
    <div class="pstep"   id="pStep"></div>
    <div class="pmembers" id="pMembers"></div>
    <div class="presult" id="pResult" style="display:none;"></div>
    <div class="pbtns">
      <button class="pbtn pbtn-cancel" id="pCancel">취소</button>
      <button class="pbtn pbtn-ok" id="pOk" disabled style="display:none;">확인</button>
    </div>
  </div>
</div>

<script>
// ── 상수 ─────────────────────────────────────────────
const BASE = new Date(2026,6,1); 
const CYCLE = ['야','비','주']; 
const BASE_IDX = [0,1,2]; 
const FULL_NAMES = {1:['김영환','조상철'],2:['장영민','최서현'],3:['김판수','김진한']}; 
const DISP_NAMES = {1:['영환','상철'],2:['영민','서현'],3:['판','한']}; 
const HOURS = {주:8,야:12,비:0}; 
const HOLIDAYS = {
  '2026-01-01':'신정','2026-02-17':'설연휴','2026-02-18':'설날','2026-02-19':'설연휴',
  '2026-03-01':'삼일절','2026-05-05':'어린이날','2026-05-24':'부처님오신날',
  '2026-06-06':'현충일','2026-07-17':'제헌절','2026-08-15':'광복절',
  '2026-09-24':'추석연휴','2026-09-25':'추석','2026-09-26':'추석연휴',
  '2026-10-03':'개천절','2026-10-09':'한글날','2026-12-25':'크리스마스',
};

let vacData={}, swapData={}; 

function loadAll(){
  try{ vacData  = JSON.parse(localStorage.getItem('gv')||'{}'); }catch(e){vacData={};} 
  try{ swapData = JSON.parse(localStorage.getItem('gs')||'{}'); }catch(e){swapData={};} 
}
function doSave(){
  try{
    localStorage.setItem('gv', JSON.stringify(vacData)); 
    localStorage.setItem('gs', JSON.stringify(swapData)); 
    const msg=document.getElementById('saveMsg'); 
    msg.classList.add('show'); 
    setTimeout(()=>msg.classList.remove('show'),2500); 
  }catch(e){ alert('저장 실패: '+e.message); }
}

function getShifts(date){
  const diff=Math.round((new Date(date.getFullYear(),date.getMonth(),date.getDate())-BASE)/86400000); 
  return [0,1,2].map(i=>CYCLE[((BASE_IDX[i]+diff)%3+3)%3]); 
}
function vKey(date,jo,mi){return `${date.getFullYear()}_${date.getMonth()}_${date.getDate()}_${jo}_${mi}`;} 
function sKey(date,jo,type){return `${date.getFullYear()}_${date.getMonth()}_${date.getDate()}_${jo}_${type}`;} 

function weekHours(jo,mi,refDate){
  const dow=refDate.getDay(), off=dow===0?6:dow-1; 
  const mon=new Date(refDate); mon.setDate(mon.getDate()-off); 
  let tot=0; 
  for(let i=0;i<7;i++){
    const d=new Date(mon); d.setDate(d.getDate()+i); 
    const s=getShifts(d); 
    tot += vacData[vKey(d,jo,mi)] ? 0 : (HOURS[s[jo-1]]||0); 
  }
  return tot; 
}

function isPast(date){
  const today=new Date(); today.setHours(0,0,0,0); 
  const d=new Date(date); d.setHours(0,0,0,0); 
  return d < today; 
}

let curY, curM; 

function init(){
  loadAll(); 
  const n=new Date(); curY=n.getFullYear(); curM=n.getMonth(); 
  fillYearSel(); render(); 
}
function fillYearSel(){
  const s=document.getElementById('yearSel'); s.innerHTML=''; 
  for(let y=2024;y<=2030;y++){
    const o=document.createElement('option'); 
    o.value=y; o.textContent=y+'년'; if(y===curY)o.selected=true; 
    s.appendChild(o); 
  }
}
function render(){
  document.getElementById('mTitle').textContent=`${curM+1}월 근무표`; 
  document.getElementById('yearSel').value=curY; 
  renderCal(); renderSummary(); 
  if(swapMode.active) setTimeout(applyHighlight,40); 
}

function mkTot(){ const t={}; [1,2,3].forEach(jo=>{t[jo]={0:0,1:0};}); return t; } 

function addHoursToTot(t,date){
  const s=getShifts(date); 
  [1,2,3].forEach((jo,i)=>[0,1].forEach(mi=>{
    t[jo][mi] += vacData[vKey(date,jo,mi)] ? 0 : (HOURS[s[i]]||0); 
  }));
}

function wkTotRow(t,dim=false){
  let h=`</tr><tr class="wk-row"><td colspan="7" style="${dim?'opacity:.55;':''}">`; 
  [1,2,3].forEach(jo=>[0,1].forEach(mi=>{
    const v=t[jo][mi], ov=v>52; 
    h+=`<span class="wkjo b${jo}" style="font-size:9px;padding:1px 3px;margin-right:2px;">${FULL_NAMES[jo][mi].charAt(0)}</span>` 
      +`<span class="${ov?'wk-ov':''}" style="font-size:10px;margin-right:5px;">${v}h${ov?'⚠':''}</span>`; 
  }));
  return h+`</td>`; 
}

function dimCell(date,d){
  const s=getShifts(date); 
  let h=`<td class="dim-cell"><div class="date-num" style="color:#bbb;">${d}</div>`; 
  ['주','야'].forEach(type=>{
    const jl=[1,2,3].filter((_,i)=>s[i]===type); 
    if(jl.length){ h+=`<div class="shift-row">`; jl.forEach(jo=>{h+=`<span class="badge-sm b${jo}" style="opacity:.28;">${jo}조</span>`;}); h+=`</div>`; } 
  });
  return h+`</td>`; 
}

function renderCal(){
  const wrap=document.getElementById('calWrap'); 
  const dim=new Date(curY,curM+1,0).getDate(); 
  const fd=new Date(curY,curM,1).getDay(); 
  const so=fd===0?6:fd-1; 

  const wkTot={}; 
  for(let d=1; d<=dim; d++){
    const dt=new Date(curY,curM,d); 
    if(dt.getDay()!==0) continue; 
    const t=mkTot(); 
    for(let bk=6; bk>=0; bk--) addHoursToTot(t,new Date(curY,curM,d-bk)); 
    wkTot[d]=t; 
  }

  const lastDt=new Date(curY,curM,dim); 
  const lastDow=lastDt.getDay(); 
  let nextDays=[],lastWkTot=null; 
  if(lastDow!==0){
    const t=mkTot(); 
    for(let bk=lastDow-1; bk>=0; bk--) addHoursToTot(t,new Date(curY,curM,dim-bk)); 
    for(let nd=1; nd<=7-lastDow; nd++){
      const ndt=new Date(curY,curM+1,nd); 
      addHoursToTot(t,ndt); 
      nextDays.push({date:ndt,d:nd}); 
    }
    lastWkTot=t; 
  }

  let html=`<table><thead class="day-header"><tr>`; 
  ['월','화','수','목','금','토','일'].forEach(n=>html+=`<th>${n}</th>`); 
  html+=`</tr></thead><tbody><tr>`; 
  let col=0; 

  const prevDim=new Date(curY,curM,0).getDate(); 
  for(let i=0; i<so; i++){
    const pd=prevDim-so+1+i; 
    html+=dimCell(new Date(curY,curM-1,pd),pd); col++; 
  }

  for(let d=1; d<=dim; d++){
    if(col===7){html+=`</tr><tr>`;col=0;} 
    const dt=new Date(curY,curM,d); 
    const dow=dt.getDay(); 
    const isSun=dow===0,isSat=dow===6; 
    const hk=`${curY}-${String(curM+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; 
    const holi=HOLIDAYS[hk]; 
    const shifts=getShifts(dt); 
    let nc=isSun?'sun':isSat?'sat':''; if(holi)nc='hol'; 
    const past=isPast(dt); 

    html+=`<td data-cd="${curY}-${curM}-${d}"${past?' style="background:#fafafa;"':''}>`; 
    html+=`<div class="date-num ${nc}">${d}${past?'<span style="font-size:8px;color:#ccc;margin-left:2px;"></span>':''}${holi?`<span class="holi-label">${holi}</span>`:''}</div>`; 

    ['주','야'].forEach(type=>{
      const jl=[1,2,3].filter((_,i)=>shifts[i]===type); 
      if(!jl.length) return; 
      html+=`<div class="shift-row">`; 
      jl.forEach(jo=>{
        const sk=sKey(dt,jo,type), sw=swapData[sk]; 
        const v0=vacData[vKey(dt,jo,0)], v1=vacData[vKey(dt,jo,1)]; 
        const blinkK=`${curY}-${curM}-${d}-${jo}-${type}`; 
        const isBlinking=swapMode.active&&swapMode.blinkSet&&swapMode.blinkSet.has(blinkK); 
        const blinkCls=isBlinking?' blink-avail':''; 
        const clickFn=isBlinking 
          ? `onBlinkBadgeClick(this,event)` 
          : `onBadgeClick(this)`; 
        html+=`<span class="badge-sm b${jo}${blinkCls}" data-date="${curY}-${curM}-${d}" data-jo="${jo}" data-type="${type}" onclick="${clickFn}">${jo}조</span>`; 
        if(v0) html+=`<span class="vac-label">${DISP_NAMES[jo][0]}휴</span>`; 
        if(v1) html+=`<span class="vac-label">${DISP_NAMES[jo][1]}휴</span>`; 
        if(sw){
          const a=sw.hoursA<=52,b=sw.hoursB<=52; 
          const dispA=getDispName(sw.joA,sw.nameA); 
          const dispB=getDispName(sw.joB,sw.nameB); 
          html+=`<span class="swap-label">${dispA}→${dispB}<br>` 
            +`<span class="${a?'s-ok':'s-ov'}">${sw.hoursA}h${a?'✓':'⚠'}</span> ` 
            +`<span class="${b?'s-ok':'s-ov'}">${sw.hoursB}h${b?'✓':'⚠'}</span></span>`; 
        }
      });
      html+=`</div>`; 
    });
    html+=`</td>`; col++; 

    if(isSun&&wkTot[d]){ html+=wkTotRow(wkTot[d]); html+=`<tr>`; col=0; } 
  }

  nextDays.forEach(({date,d})=>{
    if(col===7){html+=`</tr><tr>`;col=0;} 
    html+=dimCell(date,d); col++; 
    if(date.getDay()===0&&lastWkTot){ html+=wkTotRow(lastWkTot,true); html+=`<tr>`; col=0; } 
  });

  html+=`</tr></tbody></table>`; 
  wrap.innerHTML=html; 
}

function renderSummary(){
  const wrap=document.getElementById('wkSummary'); 
  const dim=new Date(curY,curM+1,0).getDate(); 
  const fd=new Date(curY,curM,1).getDay(), off=fd===0?6:fd-1; 
  let ws=new Date(curY,curM,1-off); 
  const weeks=[]; 
  while(ws<=new Date(curY,curM,dim)){
    const we=new Date(ws); we.setDate(we.getDate()+6); 
    weeks.push({s:new Date(ws),e:new Date(we)}); 
    ws.setDate(ws.getDate()+7); 
  }
  const jh={1:{},2:{},3:{}}; 
  weeks.forEach((w,wi)=>{
    [1,2,3].forEach(jo=>{jh[jo][wi]={0:0,1:0};}); 
    let c=new Date(w.s); 
    while(c<=w.e){
      const s=getShifts(c); 
      [1,2,3].forEach((jo,i)=>[0,1].forEach(mi=>{
        jh[jo][wi][mi]+=vacData[vKey(c,jo,mi)]?0:(HOURS[s[i]]||0); 
      }));
      c.setDate(c.getDate()+1); 
    }
  });
  let html=`<table><thead class="wkh"><tr><th>조/이름</th>`; 
  weeks.forEach((w,i)=>{
    html+=`<th>${w.s.getMonth()+1}/${w.s.getDate()}~${w.e.getMonth()+1}/${w.e.getDate()}<br><small>주${i+1}</small></th>`; 
  });
  html+=`<th>합계</th></tr></thead><tbody>`; 
  [1,2,3].forEach(jo=>[0,1].forEach(mi=>{
    const name=FULL_NAMES[jo][mi]; 
    const wt=weeks.map((_,wi)=>jh[jo][wi][mi]); 
    const tot=wt.reduce((a,b)=>a+b,0); 
    html+=`<tr class="wkr"><td class="wkname"><span class="wkjo b${jo}">${jo}조</span> ${name}</td>` 
      +wt.map(h=>`<td class="${h>52?'ov':'ok'}">${h}h${h>52?' ⚠️':''}</td>`).join('') 
      +`<td style="font-weight:700;">${tot}h</td></tr>`; 
  }));
  html+=`</tbody></table>`; 
  wrap.innerHTML=html; 
}

function getDispName(jo, fullName){
  if(jo===3){ 
    if(fullName==='김판수') return '판'; 
    if(fullName==='김진한') return '한'; 
  }
  return fullName.charAt(0); 
}

function onBlinkBadgeClick(el, ev){
  ev.stopPropagation(); 
  const [y,m,d]=el.dataset.date.split('-').map(Number); 
  const clickedJo=parseInt(el.dataset.jo); 
  
  if(clickedJo===swapMode.selA.jo){
    alert(`같은 조끼리는 일자 매칭이 불가능합니다.`);
    return;
  }
  const dk=`${y}-${m}-${d}`; 
  openDatePopup(dk); 
}

// ── 교대 모드 탐색 ─────────────────────────────────────
let swapMode={active:false,selA:null,possible:{},blinkSet:null}; 

function cancelSwap(){
  swapMode={active:false,selA:null,possible:{},blinkSet:null}; 
  document.getElementById('swapBanner').classList.remove('active'); 
  document.querySelectorAll('td.swap-ok-cell,td.swap-dim').forEach(td=>{
    td.classList.remove('swap-ok-cell','swap-dim'); td.onclick=null; 
  });
  document.querySelectorAll('.blink-avail').forEach(b=>b.classList.remove('blink-avail')); 
}

// [핵심 버그 수정 및 최적화]
function calcSwapTargets(selA, reqDate){
  const possible={};
  const blinkSet=new Set();

  const today = new Date();
  today.setHours(0,0,0,0);

  // 시스템 오늘 날짜 기준 해당 연도의 12월 31일까지만 루프 탐색 한계 설정
  const endLoop = new Date(today.getFullYear(), 11, 31);
  endLoop.setHours(23,59,59,999);

  let cur = new Date(today); // 무조건 요청일이 아닌 '오늘 이후' 날짜부터 탐색

  while(cur <= endLoop){
    const s = getShifts(cur);
    const sA = s[selA.jo-1];
    
    if(sA === '주' || sA === '야'){
      const hrs = HOURS[sA];
      const whA = weekHours(selA.jo, selA.mi, cur);
      const newA = whA - hrs;
      
      if(newA >= 0 && newA <= 52){
        const limit = sA === '주' ? 44 : 40;
        const cands = [];
        
        [1,2,3].forEach(jo => {
          if(jo === selA.jo) return; // 동일 조 매칭 제외 (2조 클릭 시 2조 매칭 차단)
          if(s[jo-1] !== '비') return; // 상대방 비번 조건 확인
          
          [0,1].forEach(mi => {
            const whB = weekHours(jo, mi, cur);
            const newB = whB + hrs;
            if(whB <= limit && newB <= 52){
              cands.push({jo, mi, name:FULL_NAMES[jo][mi], dispName:DISP_NAMES[jo][mi], curH:whB, newH:newB, type:sA});
            }
          });
        });
        
        if(cands.length > 0){
          const dk = `${cur.getFullYear()}-${cur.getMonth()}-${cur.getDate()}`;
          possible[dk] = {cands, shiftType:sA, newA};
          // 버그 수정: 본인 조(selA.jo)가 아니라 실제 들어갈 수 있는 상대방의 조(jo)들을 점멸 리스트에 등록
          cands.forEach(c => {
            blinkSet.add(`${cur.getFullYear()}-${cur.getMonth()}-${cur.getDate()}-${c.jo}-${sA}`);
          });
        }
      }
    }
    cur.setDate(cur.getDate() + 1);
  }
  return {possible, blinkSet};
}

function applyHighlight(){
  if(!swapMode.active) return; 
  document.querySelectorAll('#calWrap td[data-cd]').forEach(td=>{
    const dk=td.dataset.cd; if(!dk) return; 
    if(swapMode.possible[dk]){
      td.classList.add('swap-ok-cell'); td.classList.remove('swap-dim'); 
      td.onclick=(e)=>{ if(e.target===td||e.target.classList.contains('date-num')) openDatePopup(dk); }; 
    } else {
      td.classList.add('swap-dim'); td.classList.remove('swap-ok-cell'); td.onclick=null; 
    }
  });
  document.querySelectorAll('.badge-sm[data-date]').forEach(b=>{
    const bk=`${b.dataset.date}-${b.dataset.jo}-${b.dataset.type}`; 
    if(swapMode.blinkSet&&swapMode.blinkSet.has(bk)) b.classList.add('blink-avail'); 
    else b.classList.remove('blink-avail'); 
  });
  document.getElementById('swapBanner').classList.add('active'); 
}

let pState={date:null,jo:null,type:null,mode:'menu',selA:null,selB:null}; 

function showOverlay(){ document.getElementById('overlay').classList.add('on'); } 
function hideOverlay(){ document.getElementById('overlay').classList.remove('on'); } 
function setPOk(show,label,disabled){
  const b=document.getElementById('pOk'); 
  b.style.display=show?'':'none'; b.disabled=!!disabled; 
  if(label) b.textContent=label; 
}
function setResult(html){
  const r=document.getElementById('pResult'); 
  r.style.display=html?'block':'none'; if(html)r.innerHTML=html; 
}

function onBadgeClick(el){
  if(swapMode.active){ cancelSwap(); return; } 
  const [y,m,d]=el.dataset.date.split('-').map(Number); 
  pState.date=new Date(y,m,d); pState.jo=parseInt(el.dataset.jo); 
  pState.type=el.dataset.type; pState.selA=null; pState.selB=null; 
  pState.mode='menu'; 
  showMenu(); 
}

function showMenu(){
  const dt=pState.date, jo=pState.jo; 
  const m=dt.getMonth()+1, d=dt.getDate(); 
  document.getElementById('pTitle').textContent=`${m}월 ${d}일 ${jo}조 (${pState.type}간)`; 
  document.getElementById('pStep').textContent='무엇을 하시겠습니까?'; 
  setResult(null); setPOk(false); 
  const v0=vacData[vKey(dt,jo,0)], v1=vacData[vKey(dt,jo,1)]; 
  const hasVac=v0||v1; 

  document.getElementById('pMembers').innerHTML=`
    <button class="pmbtn" onclick="showSwapStep1()">🔄 교대 요청 (다른 조에게)</button>
    <button class="pmbtn vbtn" onclick="showVacStep()">🏖️ 휴가 입력 / 취소</button>
    ${hasVac?`<button class="pmbtn dbtn" onclick="showVacDelStep()">🗑️ 휴가 취소</button>`:''}
  `; 
  showOverlay(); 
}

function showSwapStep1(){
  pState.mode='swap1'; 
  const dt=pState.date, jo=pState.jo, type=pState.type; 
  const hrs=HOURS[type]; 
  document.getElementById('pTitle').textContent=`${jo}조 교대 요청`; 
  document.getElementById('pStep').textContent=`① ${jo}조 중 쉬고 싶은 조원 선택 → 오늘 이후 교대 가능일 점멸`; 
  setResult(null); setPOk(false); 
  document.getElementById('pMembers').innerHTML=FULL_NAMES[jo].map((name,mi)=>{ 
    const wh=weekHours(jo,mi,dt), newWh=wh-hrs; 
    const ok=newWh>=0&&newWh<=52; 
    return `<button class="pmbtn" onclick="startSwapMode(${mi})">
      <span class="pdot pd${jo}"></span>
      <span>${name}</span>
      <span style="margin-left:auto;font-size:11px;">
        <span style="color:#888;">${wh}h</span>
        <span style="color:${ok?'#2e7d32':'#e53935'};font-weight:700;"> → ${newWh}h</span>
      </span>
    </button>`;
  }).join(''); 
}

function startSwapMode(mi){
  pState.selA={jo:pState.jo,mi,name:FULL_NAMES[pState.jo][mi]}; 
  const reqDate=pState.date; 
  const {possible,blinkSet}=calcSwapTargets(pState.selA,reqDate);
  swapMode={active:true,selA:pState.selA,possible,blinkSet};
  hideOverlay(); 
  setTimeout(applyHighlight,40); 
}

function openDatePopup(dk){
  const [y,m,d]=dk.split('-').map(Number);
